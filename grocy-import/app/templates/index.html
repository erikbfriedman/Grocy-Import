<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocy Import</title>
    <link rel="stylesheet" href="{{ ingress_path }}/static/lib/jsuites.css">
    <link rel="stylesheet" href="{{ ingress_path }}/static/lib/jspreadsheet.css">
    <script src="{{ ingress_path }}/static/lib/jsuites.js"></script>
    <script src="{{ ingress_path }}/static/lib/jspreadsheet.js"></script>
    <style>
        :root {
            --primary: #03a9f4;
            --bg: #111827;
            --surface: #1f2937;
            --surface2: #374151;
            --border: #4b5563;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }
        body { display: flex; flex-direction: column; overflow: hidden; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .toolbar-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
            margin-right: 4px;
        }
        .sep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

        select {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            max-width: 200px;
        }
        select:focus { border-color: var(--primary); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            background: var(--surface2);
            color: var(--text-muted);
            transition: all 0.12s;
            line-height: 1.5;
        }
        .btn:hover:not(:disabled) { color: var(--text); border-color: var(--text-muted); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            font-size: 13px;
            padding: 5px 16px;
        }
        .btn-primary:hover:not(:disabled) { filter: brightness(1.1); color: #fff; border-color: var(--primary); }

        .status {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            font-family: monospace;
        }
        .status.ok { color: var(--success); }
        .status.error { color: var(--error); }
        .status.loading { color: var(--warning); }

        .autosave-badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            background: var(--success);
            color: #fff;
            flex-shrink: 0;
        }
        .autosave-badge.visible { opacity: 1; }
        .autosave-badge.error { background: var(--error); }
        .autosave-badge.saving { background: var(--warning); }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 10px 12px;
            gap: 8px;
        }

        .notice {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid var(--warning);
            border-radius: 6px;
            font-size: 12px;
            color: var(--warning);
            flex-shrink: 0;
        }

        .grid-wrap {
            flex: 1;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            min-height: 0;
        }
        #spreadsheet { width: 100%; height: 100%; }

        /* jspreadsheet dark theme */
        .jexcel_content { background: var(--surface) !important; }
        .jexcel > thead > tr > td {
            background: var(--surface2) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
            font-weight: 600 !important;
            font-size: 11px !important;
            text-transform: uppercase !important;
            letter-spacing: 0.03em !important;
        }
        .jexcel > tbody > tr > td {
            background: var(--surface) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
            font-size: 13px !important;
        }
        .jexcel > tbody > tr > td:first-child {
            background: var(--surface2) !important;
            color: var(--text-muted) !important;
        }
        .jexcel > tbody > tr > td.readonly {
            background: rgba(55, 65, 81, 0.6) !important;
            color: var(--text-muted) !important;
            font-style: italic !important;
        }
        .jexcel > tbody > tr > td.highlight,
        .jexcel > tbody > tr > td.selected {
            background: rgba(3, 169, 244, 0.18) !important;
        }
        .jexcel_corner { background: var(--surface2) !important; border-color: var(--border) !important; }

        /* dropdown picker dark theme */
        .jdropdown-container {
            background: var(--surface2) !important;
            border-color: var(--border) !important;
            color: var(--text) !important;
        }
        .jdropdown-item:hover { background: rgba(3,169,244,0.2) !important; }
        .jdropdown-item.selected { background: rgba(3,169,244,0.3) !important; }
        .jdropdown-search input {
            background: var(--bg) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
        }

        .log-panel {
            height: 100px;
            overflow-y: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            flex-shrink: 0;
        }
        .log-entry { padding: 1px 0; line-height: 1.6; }
        .log-entry.ok { color: var(--success); }
        .log-entry.error { color: var(--error); }
        .log-entry.info { color: var(--text-muted); }
        .log-placeholder { color: var(--text-muted); font-style: italic; }

        #csvFile { display: none; }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="toolbar-title">Grocy Import</span>

        <select id="entitySelect" onchange="onEntityChange()">
            {% for key, label in entities.items() %}
            <option value="{{ key }}">{{ label }}</option>
            {% endfor %}
        </select>

        <div class="sep"></div>

        <button class="btn" onclick="loadExisting()">Load Existing</button>
        <button class="btn" onclick="addRows(10)">+ 10 Rows</button>
        <button class="btn" onclick="clearGrid()">Clear</button>

        <div class="sep"></div>

        <button class="btn" onclick="document.getElementById('csvFile').click()">Upload CSV</button>
        <button class="btn" onclick="downloadCsv()">Download CSV</button>
        <input type="file" id="csvFile" accept=".csv" onchange="uploadCsv(event)">

        <div class="sep"></div>

        <button class="btn btn-primary" onclick="importAll()">Import All &rarr;</button>
        <span class="autosave-badge" id="autosaveBadge">saved</span>
        <span class="status" id="statusBadge"></span>
    </div>

    <div class="main">
        <div id="configNotice" class="notice" style="display:none">
            &#9888; Grocy is not configured. Go to the add-on <strong>Configuration</strong> tab and set your Grocy URL and API key.
        </div>
        <div class="grid-wrap">
            <div id="spreadsheet"></div>
        </div>
        <div class="log-panel" id="logPanel">
            <div class="log-placeholder">Changes are saved automatically. Import log appears here.</div>
        </div>
    </div>

    <script>
        const BASE = '{{ ingress_path | safe }}';
        function url(path) { return BASE + path; }

        let sheet = null;
        let currentCols = [];
        let currentFieldSources = {};
        let currentEntity = document.getElementById('entitySelect').value;
        let suppressAutoSave = false;

        const saveTimers = {};
        let autosaveFadeTimer = null;

        // ── Boot ────────────────────────────────────────────────────────────

        checkConfig();
        loadSchema(false);

        // ── Config check ────────────────────────────────────────────────────

        async function checkConfig() {
            try {
                const r = await fetch(url('/api/config'));
                const cfg = await r.json();
                document.getElementById('configNotice').style.display = cfg.configured ? 'none' : 'flex';
            } catch {}
        }

        // ── Entity change ───────────────────────────────────────────────────

        async function onEntityChange() {
            currentEntity = document.getElementById('entitySelect').value;
            await loadSchema(false);
        }

        // ── Schema + lookups ────────────────────────────────────────────────

        async function loadSchema(withData) {
            setStatus('Loading…', 'loading');
            try {
                const [schemaResp, lookupsResp] = await Promise.all([
                    fetch(url(`/api/schema/${currentEntity}?withData=${withData ? '1' : '0'}`)),
                    fetch(url('/api/lookups')),
                ]);
                const schema  = await schemaResp.json();
                const lookups = await lookupsResp.json();
                currentCols = schema.columns;
                currentFieldSources = lookups;
                buildSheet(currentCols, withData ? schema.data : [], lookups);
                if (withData) {
                    setStatus(`${schema.data.length} records loaded`, 'ok');
                    log(`Loaded ${schema.data.length} existing ${currentEntity} records`, 'info');
                } else {
                    setStatus('Ready', '');
                }
            } catch (e) {
                setStatus('Load failed', 'error');
                log('Load error: ' + e.message, 'error');
            }
        }

        async function loadExisting() { await loadSchema(true); }

        // ── Build spreadsheet ────────────────────────────────────────────────

        function buildSheet(columns, data, fieldSources) {
            const el = document.getElementById('spreadsheet');
            if (sheet) {
                try { jspreadsheet.destroy(el); } catch (e) {}
                el.innerHTML = '';
                sheet = null;
            }

            const colDefs = columns.map(col => {
                const source = fieldSources[col];
                return {
                    type:     source ? 'dropdown' : 'text',
                    title:    col,
                    source:   source || undefined,
                    width:    col === 'id' ? 55
                            : source ? 200
                            : col.includes('description') || col.includes('note') ? 240
                            : col.includes('name') ? 200
                            : 150,
                    readOnly: col === 'id',
                    autocomplete: source ? true : undefined,
                };
            });

            let tableData;
            if (data && data.length > 0) {
                tableData = data.map(row =>
                    columns.map(c => {
                        const v = row[c];
                        return v === null || v === undefined ? '' : String(v);
                    })
                );
                tableData = tableData.concat(
                    Array(10).fill(null).map(() => Array(columns.length).fill(''))
                );
            } else {
                tableData = Array(50).fill(null).map(() => Array(columns.length).fill(''));
            }

            const wrapH = document.querySelector('.grid-wrap').clientHeight;

            suppressAutoSave = true;
            sheet = jspreadsheet(el, {
                data: tableData,
                columns: colDefs,
                tableOverflow: true,
                tableWidth: '100%',
                tableHeight: (wrapH - 2) + 'px',
                minDimensions: [columns.length, 50],
                allowInsertColumn: false,
                allowDeleteColumn: false,
                onchange: function(instance, cell, x, y, value) {
                    if (!suppressAutoSave) scheduleRowSave(y);
                },
                contextMenu: function(obj, x, y, e, items) {
                    return items.filter(item =>
                        item && typeof item.title === 'string' && /row/i.test(item.title)
                    );
                },
            });
            suppressAutoSave = false;
        }

        // ── Auto-save on cell commit ─────────────────────────────────────────

        function scheduleRowSave(rowIdx) {
            clearTimeout(saveTimers[rowIdx]);
            saveTimers[rowIdx] = setTimeout(() => saveRow(rowIdx), 400);
        }

        async function saveRow(rowIdx) {
            const allData = sheet.getData();
            const rowArr  = allData[rowIdx];
            if (!rowArr) return;

            const obj = {};
            currentCols.forEach((col, i) => {
                const v = rowArr[i];
                if (v !== '' && v !== null && v !== undefined) obj[col] = v;
            });

            const keys = Object.keys(obj);
            // Skip completely empty rows or rows with only an id and no data
            if (keys.length === 0) return;
            if (keys.length === 1 && keys[0] === 'id') return;

            showAutosave('saving', 'saving…');
            try {
                const resp = await fetch(url(`/api/import/${currentEntity}`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rows: [obj] }),
                });
                const result = await resp.json();
                const r = result.results[0];

                if (r.ok) {
                    // If this was a new row, write the returned id back into the id cell
                    if (r.created_id) {
                        const idColIdx = currentCols.indexOf('id');
                        if (idColIdx >= 0) {
                            suppressAutoSave = true;
                            sheet.setValueFromCoords(idColIdx, rowIdx, r.created_id, true);
                            suppressAutoSave = false;
                        }
                    }
                    showAutosave('ok', 'saved');
                    log(`Row ${rowIdx + 1}: ✓ saved${r.created_id ? ' (id=' + r.created_id + ')' : ''}`, 'ok');
                } else {
                    showAutosave('error', 'error');
                    const detail = JSON.stringify(r.response || r.error || '');
                    log(`Row ${rowIdx + 1}: ✗ ${r.status} — ${detail}`, 'error');
                }
            } catch (e) {
                showAutosave('error', 'error');
                log(`Row ${rowIdx + 1}: save error — ${e.message}`, 'error');
            }
        }

        function showAutosave(type, label) {
            const badge = document.getElementById('autosaveBadge');
            badge.textContent = label;
            badge.className = `autosave-badge visible ${type}`;
            clearTimeout(autosaveFadeTimer);
            if (type !== 'saving') {
                autosaveFadeTimer = setTimeout(() => {
                    badge.className = 'autosave-badge';
                }, 2000);
            }
        }

        // ── Grid helpers ─────────────────────────────────────────────────────

        function clearGrid() {
            if (!sheet) return;
            suppressAutoSave = true;
            sheet.setData(Array(50).fill(null).map(() => Array(currentCols.length).fill('')));
            suppressAutoSave = false;
            log('Grid cleared', 'info');
            setStatus('Cleared', '');
        }

        function addRows(n) {
            if (!sheet) return;
            suppressAutoSave = true;
            sheet.insertRow(Array(n).fill(null).map(() => Array(currentCols.length).fill('')));
            suppressAutoSave = false;
        }

        function downloadCsv() {
            if (sheet) sheet.download(false);
        }

        // ── CSV upload ───────────────────────────────────────────────────────

        function uploadCsv(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const lines = e.target.result.trim().split(/\r?\n/);
                if (!lines.length) return;
                const headers = parseCsvRow(lines[0]);
                const rows    = lines.slice(1).map(l => parseCsvRow(l));
                const colMap  = headers.map(h => currentCols.indexOf(h.trim()));
                const aligned = rows.map(row => {
                    const out = Array(currentCols.length).fill('');
                    colMap.forEach((ci, i) => { if (ci >= 0 && row[i] !== undefined) out[ci] = row[i]; });
                    return out;
                });
                suppressAutoSave = true;
                if (sheet) sheet.setData(aligned);
                suppressAutoSave = false;
                log(`CSV uploaded: ${aligned.length} rows`, 'info');
                const unmatched = headers.filter((h, i) => colMap[i] < 0);
                if (unmatched.length) log(`Unmatched columns (ignored): ${unmatched.join(', ')}`, 'error');
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function parseCsvRow(line) {
            const result = [];
            let cur = '', inQ = false;
            for (let i = 0; i < line.length; i++) {
                const c = line[i];
                if (c === '"') {
                    if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
                    else { inQ = !inQ; }
                } else if (c === ',' && !inQ) {
                    result.push(cur); cur = '';
                } else { cur += c; }
            }
            result.push(cur);
            return result;
        }

        // ── Bulk import (Import All button) ──────────────────────────────────

        async function importAll() {
            if (!sheet) return;

            const data = sheet.getData();
            const rows = [];
            data.forEach(row => {
                const obj = {};
                currentCols.forEach((col, i) => {
                    const v = row[i];
                    if (v !== '' && v !== null && v !== undefined) obj[col] = v;
                });
                const keys = Object.keys(obj);
                if (keys.length > 0 && !(keys.length === 1 && keys[0] === 'id')) rows.push(obj);
            });

            if (rows.length === 0) { log('Nothing to import', 'info'); return; }

            clearLog();
            setStatus(`Importing ${rows.length} rows…`, 'loading');
            log(`Bulk importing ${rows.length} rows into ${currentEntity}…`, 'info');

            try {
                const resp = await fetch(url(`/api/import/${currentEntity}`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rows }),
                });
                const result = await resp.json();
                let ok = 0, errs = 0;
                result.results.forEach((r, i) => {
                    if (r.ok) {
                        ok++;
                        log(`Row ${i + 1}: ✓ ${r.status}${r.created_id ? ' → id=' + r.created_id : ''}`, 'ok');
                    } else {
                        errs++;
                        log(`Row ${i + 1}: ✗ ${r.status} — ${JSON.stringify(r.response || r.error || '')}`, 'error');
                    }
                });
                setStatus(`${ok} imported, ${errs} failed`, errs > 0 ? 'error' : 'ok');
            } catch (e) {
                setStatus('Request failed', 'error');
                log('Import error: ' + e.message, 'error');
            }
        }

        // ── UI helpers ───────────────────────────────────────────────────────

        function setStatus(msg, type) {
            const el = document.getElementById('statusBadge');
            el.textContent = msg;
            el.className = 'status ' + (type || '');
        }

        function clearLog() { document.getElementById('logPanel').innerHTML = ''; }

        function log(msg, type) {
            const panel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + (type || 'info');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            panel.appendChild(entry);
            panel.scrollTop = panel.scrollHeight;
        }
    </script>
</body>
</html>
